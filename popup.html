<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Lecture Notes</title>
  </head>
  <body>
    <div class="popup-wrapper">
      <div class="header-row">
        <div class="logo-row">
          <div class="title-wrap">
            <h1 class="app-title">SlideNotes</h1>
            <p class="subtitle">Screenshots to PDF in seconds</p>
          </div>
        </div>
        <span id="count" class="badge">0 pages</span>
      </div>
      <div class="panel">
        <p id="hint" class="hint"></p>
      </div>
      <div class="actions-grid">
        <button id="capture" class="btn btn-capture">Capture</button>
        <button id="open-editor" class="btn btn-manage">Manage</button>
        <button id="generate" class="btn btn-export">Export PDF</button>
        <button id="clear" class="btn btn-clear">Clear All</button>
      </div>
      <div id="toast" class="toast hidden"></div>
      <p class="footer-note">
        Ctrl+Shift+X &nbsp;capture &nbsp;&middot;&nbsp; Ctrl+Shift+Z
        &nbsp;export
      </p>
    </div>
    <script src="lib/jspdf.umd.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
