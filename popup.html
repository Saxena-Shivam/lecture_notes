<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Lecture Notes</title>
  </head>
  <body>
    <div class="popup-wrapper">
      <div class="header-row">
        <div class="title-wrap">
          <h1 class="app-title">Lecture Notes</h1>
          <p class="subtitle">
            Capture lecture slides and export polished PDF notes.
          </p>
        </div>
        <span id="count" class="badge">0 pages</span>
      </div>

      <div class="panel">
        <p id="hint" class="hint">
          Open your lecture tab and click Capture for each important slide.
        </p>
      </div>

      <div class="actions-grid">
        <button id="capture" class="btn btn-primary">Capture</button>
        <button id="open-editor" class="btn btn-secondary">Manage Pages</button>
        <button id="generate" class="btn btn-success">Export PDF</button>
        <button id="clear" class="btn btn-danger">Clear All</button>
      </div>

      <div id="toast" class="toast hidden"></div>
      <p class="footer-note">
        Tip: Arrange pages in Manage Pages before export.
      </p>
    </div>

    <script src="lib/jspdf.umd.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
